version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-architect-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BACKEND_PORT=8000
      - FRONTEND_URL=http://localhost:3000
      - DEBUG=False
    restart: unless-stopped
    networks:
      - ai-architect-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-architect-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai-architect-network

networks:
  ai-architect-network:
    driver: bridge

# To run:
# docker-compose up -d
#
# To stop:
# docker-compose down
#
# To view logs:
# docker-compose logs -f
